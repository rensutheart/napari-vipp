name: Documentation problem
description: Report missing, unclear, stale, or incorrect documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Page or section
      description: Link the page or name the file and heading.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Include the reader's goal or expected example when possible.
  - type: checkboxes
    id: checks
    attributes:
      label: Data safety
      options:
        - label: Any attached screenshot or workflow contains no restricted or identifying research data.
          required: true
