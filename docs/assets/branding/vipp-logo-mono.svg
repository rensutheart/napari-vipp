        <rect x="45" y="63" width="26" height="26" rx="8"/>
        <rect x="63" y="99" width="26" height="26" rx="8"/>
        <rect x="137" y="29" width="26" height="26" rx="8"/>
        <rect x="121" y="63" width="26" height="26" rx="8"/>
        <rect x="103" y="99" width="26" height="26" rx="8"/>
        <rect x="82" y="136" width="28" height="28" rx="9"/>
